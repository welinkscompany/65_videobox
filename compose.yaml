name: 65_videobox

# Compose ignores extension fields.  This is a declaration-only gate for the
# future gateway, not an issuer, route, credential delivery, or network link.
x-videobox-hermes-capability-authority:
  schema_version: v1
  issuer: videobox-agent-gateway
  issuer_owner: gateway-only
  issuance_enabled: false
  signing_secret_delivery: forbidden
  durable_revocation_storage_primitive: LocalProjectStore.revoke_hermes_capability
  owner_authorized_revocation_writer_status: not_deployed
  durable_consume_replay_boundary: ProjectStore.consume_hermes_capability
  gateway_route_status: not_deployed
  ordinary_api_paths: forbidden
  hermes_network_status: preauth-network-none
  gateway_service: videobox-agent-gateway
  gateway_network: videobox-agent-gateway-network
  gateway_route_mode: gateway-only

services:
  videobox-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-videobox}
      POSTGRES_USER: ${POSTGRES_USER:-videobox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.container}
    volumes:
      - videobox_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [videobox-internal]
    security_opt: [no-new-privileges:true]

  videobox-workspace:
    build:
      context: .
      dockerfile: docker/workspace.Dockerfile
    environment:
      VIDEOBOX_DATA_ROOT: /videobox-data
      VIDEOBOX_SNAPSHOT_ROOT: /videobox-snapshot
      VIDEOBOX_DATABASE_URL: postgresql://${POSTGRES_USER:-videobox}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.container}@videobox-postgres:5432/${POSTGRES_DB:-videobox}
    volumes:
      - ${VIDEOBOX_CONTAINER_DATA_ROOT:?set VIDEOBOX_CONTAINER_DATA_ROOT in .env.container}/runtime:/videobox-data
      - ${VIDEOBOX_CONTAINER_DATA_ROOT:?set VIDEOBOX_CONTAINER_DATA_ROOT in .env.container}/snapshot:/videobox-snapshot:ro
    depends_on:
      videobox-postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${VIDEOBOX_WEB_PORT:-5173}:8080"
    networks: [videobox-edge, videobox-internal]
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    # PID 1 only needs to launch two already-unprivileged children.
    cap_add: [SETGID, SETUID]
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  # Hermes is intentionally pre-auth only.  It starts without any network,
  # VideoBox data, DB, API, or host bridge access.  A later egress-gateway
  # slice must be complete before an interactive `hermes model` OAuth login.
  videobox-hermes-agent:
    image: nousresearch/hermes-agent@sha256:3db34ce19adfa080736a2a3feb0316dbcccc588faa9afe7fd8ae1c03b4f1a53a
    profiles: [hermes-preauth]
    command: ["sleep", "infinity"]
    network_mode: none
    volumes:
      # This scratch state is deliberately not the later OAuth state volume.
      - videobox_hermes_preauth_state:/opt/data
    read_only: true
    tmpfs:
      - /tmp:uid=10000,gid=10000,mode=1777
      # s6-overlay places its supervised init binary under /run, so this
      # one tmpfs must remain executable while the root filesystem stays RO.
      - /run:rw,exec,nosuid,nodev,mode=0755
    cap_drop: [ALL]
    # The official s6 entrypoint needs these setup capabilities to own
    # /opt/data and supervise its hermes-owned run subtree.  The agent command
    # itself must run as the unprivileged hermes user with zero effective caps.
    cap_add: [CHOWN, DAC_OVERRIDE, SETGID, SETUID]
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    mem_limit: 2g
    cpus: 2.0
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

networks:
  videobox-edge:
  videobox-internal:
    internal: true

volumes:
  videobox_postgres_data:
  videobox_hermes_preauth_state:
