name: 65_videobox

# Compose ignores extension fields.  This is a declaration-only gate for the
# future gateway, not an issuer, route, credential delivery, or network link.
x-videobox-hermes-capability-authority:
  schema_version: v1
  issuer: videobox-agent-gateway
  issuer_owner: gateway-only
  issuance_enabled: false
  signing_secret_delivery: forbidden
  durable_revocation_storage_primitive: LocalProjectStore.revoke_hermes_capability
  owner_authorized_revocation_writer_status: not_deployed
  durable_consume_replay_boundary: ProjectStore.consume_hermes_capability
  gateway_route_status: not_deployed
  ordinary_api_paths: forbidden
  hermes_network_status: preauth-network-none
  gateway_service: videobox-agent-gateway
  gateway_network: videobox-agent-gateway-network
  gateway_route_mode: gateway-only

services:
  videobox-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-videobox}
      POSTGRES_USER: ${POSTGRES_USER:-videobox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.container}
    volumes:
      - videobox_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [videobox-internal]
    security_opt: [no-new-privileges:true]

  videobox-workspace:
    build:
      context: .
      dockerfile: docker/workspace.Dockerfile
    environment:
      VIDEOBOX_DATA_ROOT: /videobox-data
      VIDEOBOX_SNAPSHOT_ROOT: /videobox-snapshot
      VIDEOBOX_DATABASE_URL: postgresql://${POSTGRES_USER:-videobox}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.container}@videobox-postgres:5432/${POSTGRES_DB:-videobox}
    volumes:
      - ${VIDEOBOX_CONTAINER_DATA_ROOT:?set VIDEOBOX_CONTAINER_DATA_ROOT in .env.container}/runtime:/videobox-data
      - ${VIDEOBOX_CONTAINER_DATA_ROOT:?set VIDEOBOX_CONTAINER_DATA_ROOT in .env.container}/snapshot:/videobox-snapshot:ro
    depends_on:
      videobox-postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${VIDEOBOX_WEB_PORT:-5173}:8080"
    networks: [videobox-edge, videobox-internal]
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    # PID 1 only needs to launch two already-unprivileged children.
    cap_add: [SETGID, SETUID]
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  # Hermes is intentionally pre-auth only.  It starts without any network,
  # VideoBox data, DB, API, or host bridge access.  A later egress-gateway
  # slice must be complete before an interactive `hermes model` OAuth login.
  videobox-hermes-agent:
    image: nousresearch/hermes-agent@sha256:ad79951c26b7707c8c651f30780338d4f9bb17ddca19f6ea78eb27cbf83a3787
    profiles: [hermes-preauth]
    command: ["sleep", "infinity"]
    network_mode: none
    volumes:
      # This scratch state is deliberately not the later OAuth state volume.
      - videobox_hermes_preauth_state:/opt/data
    read_only: true
    tmpfs:
      - /tmp:uid=10000,gid=10000,mode=1777
      # s6-overlay places its supervised init binary under /run, so this
      # one tmpfs must remain executable while the root filesystem stays RO.
      - /run:rw,exec,nosuid,nodev,mode=0755
    cap_drop: [ALL]
    # The official s6 entrypoint needs these setup capabilities to own
    # /opt/data and supervise its hermes-owned run subtree.  The agent command
    # itself must run as the unprivileged hermes user with zero effective caps.
    cap_add: [CHOWN, DAC_OVERRIDE, SETGID, SETUID]
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    mem_limit: 2g
    cpus: 2.0
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  # Interactive OAuth state is isolated from the pre-auth scratch volume and
  # from every VideoBox data, DB, API, and host mount.
  videobox-hermes-oauth-bootstrap:
    image: nousresearch/hermes-agent@sha256:ad79951c26b7707c8c651f30780338d4f9bb17ddca19f6ea78eb27cbf83a3787
    profiles: [hermes-oauth-bootstrap]
    command: ["sleep", "infinity"]
    volumes:
      - videobox_hermes_oauth_state:/opt/data
    networks: [videobox-hermes-egress]
    read_only: true
    tmpfs:
      - /tmp:uid=10000,gid=10000,mode=1777
      - /run:rw,exec,nosuid,nodev,mode=0755
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, SETGID, SETUID]
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    mem_limit: 2g
    cpus: 2.0
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  # The persistent VideoBox-owned Hermes state remains isolated from every
  # VideoBox data/API/DB network.  The provider network is only for the
  # previously owner-configured Codex OAuth provider; local memory uses the
  # separate internal network below.
  videobox-hermes-runtime:
    build:
      context: .
      dockerfile: docker/hermes/Dockerfile
    profiles: [hermes-runtime]
    entrypoint: ["/opt/hermes/docker/main-wrapper.sh"]
    command: ["sleep", "infinity"]
    working_dir: /opt/data
    volumes:
      - videobox_hermes_oauth_state:/opt/data
    networks: [videobox-hermes-memory, videobox-hermes-provider-egress]
    depends_on:
      videobox-hermes-local-ollama:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:uid=10000,gid=10000,mode=1777
      - /run:rw,exec,nosuid,nodev,mode=0755
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, SETGID, SETUID]
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    mem_limit: 2g
    cpus: 2.0
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  # No host port and no egress: this Ollama instance is reachable only by the
  # VideoBox Hermes runtime on the private memory network.
  videobox-hermes-local-ollama:
    image: ollama/ollama@sha256:1514372d3cef7387b6202b253e761d820e00e44b28f268aad5029389d0479e99
    profiles: [hermes-runtime, hermes-dashboard]
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - videobox_hermes_ollama_models:/root/.ollama
    networks: [videobox-hermes-memory]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    mem_limit: 8g
    cpus: 4.0

  # This one-shot service is the only component allowed to download local
  # Ollama models.  It is never started by the runtime profile.
  videobox-hermes-model-seed:
    image: ollama/ollama@sha256:1514372d3cef7387b6202b253e761d820e00e44b28f268aad5029389d0479e99
    profiles: [hermes-model-seed]
    entrypoint: ["/bin/sh", "-lc"]
    command: "ollama pull qwen3:4b && ollama pull nomic-embed-text"
    environment:
      OLLAMA_HOST: http://videobox-hermes-local-ollama:11434
    volumes:
      - videobox_hermes_ollama_models:/root/.ollama
    networks: [videobox-hermes-memory, videobox-hermes-model-egress]
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    mem_limit: 1g
    cpus: 1.0

  # The official dashboard must bind a container interface for Docker port
  # forwarding. `--insecure` is required by Hermes for that bind, while the
  # published port remains host-loopback only. This service sees only the
  # OAuth state volume and the isolated provider egress network, never
  # VideoBox data, DB, API, local Ollama, or internal networks. Configure
  # Mem0 Platform in the Hermes dashboard; no local memory sidecar is needed.
  videobox-hermes-dashboard:
    image: nousresearch/hermes-agent@sha256:ad79951c26b7707c8c651f30780338d4f9bb17ddca19f6ea78eb27cbf83a3787
    profiles: [hermes-dashboard]
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--insecure", "--no-open"]
    ports:
      - "127.0.0.1:9119:9119"
    volumes:
      - videobox_hermes_oauth_state:/opt/data
    networks: [videobox-hermes-provider-egress]
    read_only: true
    tmpfs:
      - /tmp:uid=10000,gid=10000,mode=1777
      - /run:rw,exec,nosuid,nodev,mode=0755
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, SETGID, SETUID]
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    mem_limit: 2g
    cpus: 2.0
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

networks:
  videobox-edge:
  videobox-internal:
    internal: true
  videobox-hermes-egress: {}
  videobox-hermes-memory:
    internal: true
  videobox-hermes-provider-egress: {}
  videobox-hermes-model-egress: {}

volumes:
  videobox_postgres_data:
  videobox_hermes_preauth_state:
  videobox_hermes_oauth_state:
  videobox_hermes_ollama_models:
